<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Comparador</title>
    <link rel="stylesheet" href="estilo.css" />
    <script src="script.js"></script>
</head>

<body>
    <nav class = "navBar">
        <div class = "flex-container flex-container-style fixed-height">
            <div class="flex-item">
                <a href="https://github.com/araxielfenix">
                    <label class = "navItem"> ARAXIEL FENIX </label>
                </a>
            </div>
            <div class="flex-item">
                <a href="https://araxielfenix.github.io/Analizador/#">
                    <label class = "navItem"> Analisador</label>
                </a>
            </div>
        </div>
    </nav>

    <br> <br> <br> <br>
    <section class="parent">
        <article>
            <label id="fileLabel1" for="file-upload1" class="custom-file-upload">
                Subir Log
            </label>
            <input id="file-upload1" type="file" onchange="getFileName1()" class="file-upload" />
        </article>
        <article>
            <label id="fileLabel2" for="file-upload2" class="custom-file-upload">
                Subir complemento
            </label>
            <input id="file-upload2" type="file" onchange="getFileName2()" class="file-upload" />
        </article>
    </section>
    <section class="compararItem">
        <button id="compararButton" class="custom-file-upload" onclick="loading()">Comparar</button>
    </section>
    <section>
        <div id = "loadingAnimation" class="loadingio-spinner-bars-2bsd7697baf"><div class="ldio-l8s7xgy80tp"><div></div><div></div><div></div><div></div></div></div>
    </section>
    <br>
    <section id = "resultados" class="Table">
        <button id="descargarButton" class="custom-file-upload" onclick="downloadList()">Descargar lista</button>
        <br> <br>
        <table id="result" class="table table-striped table-bordered" style="width:100%">
            <thead>
                <tr>
                    <th>Tarjeta</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Importe</th>
                    <th>Num. Autorización</th>
                    <th>Canal</th>
                    <th>Num. Operación</th>
                    <th>Telefono</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </section>
</body>

</html>
